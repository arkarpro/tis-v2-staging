<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Insights Solution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { tis: { dark: '#0f172a', primary: '#2563eb', secondary: '#1e3a8a', gold: '#eab308' } } } } }
    </script>
    <!-- 🟢 Google Identity Services လင့်ခ် -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="bg-gray-100 font-sans pt-16">

    <div id="navbar" class="fixed top-0 left-0 w-full z-50 bg-white shadow-sm"></div>

    <main class="max-w-7xl mx-auto px-4 pt-4 pb-24 grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
        <!-- 💡 pb-6 အစား pb-24 ဟု ပြောင်းထားပါသည် (အောက်ခြေ Bottom Nav က ဖုံးမသွားစေရန်) -->
        <div id="sidebar" class="md:col-span-3 md:sticky top-20 h-max"></div>
        <div id="content" class="md:col-span-6"></div>
        
        <!-- ================================================================= -->
        <!-- 🚧 Coming Soon Placeholder (Dashboard, Courses နှိပ်လျှင် ပေါ်ရန်)     -->
        <!-- ================================================================= -->
        <div id="coming-soon-container" class="md:col-span-6 hidden flex flex-col items-center justify-center text-center bg-white rounded-2xl shadow-sm border border-gray-100 p-10 h-max">
            <div class="text-6xl mb-6 animate-bounce">🚧</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2" id="cs-title">Coming Soon!</h2>
            <p class="text-gray-500 mb-8 max-w-sm mx-auto leading-relaxed" id="cs-message">We're building this feature.</p>
            
            <button onclick="closeComingSoon()" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition shadow-md flex items-center gap-2">
                <span>←</span> Home သို့ ပြန်သွားမည်
            </button>
        </div>

        <div id="widgets" class="md:col-span-3 md:sticky top-20 h-max"></div>
        
    </main>

    <!-- ================================================================= -->
    <!-- 📱 Mobile Bottom Navigation Bar (Mobile တွင်သာ ပေါ်မည်)           -->
    <!-- ================================================================= -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 z-[60] flex justify-around items-center pb-2 pt-2 shadow-[0_-5px_10px_rgba(0,0,0,0.05)]">
        
        <!-- 👤 Profile Tab (ဘယ်ဘက် Pane သို့ သွားရန်) -->
        <button onclick="switchMobileTab('profile')" id="nav-profile" class="nav-btn flex flex-col items-center w-1/3 text-gray-400 hover:text-blue-600 transition">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px] font-bold">Profile</span>
        </button>

        <!-- 🏠 Home Tab (အလယ် Video Pane - Default ဝင်ဝင်ချင်း ပြမည်) -->
        <button onclick="switchMobileTab('home')" id="nav-home" class="nav-btn flex flex-col items-center w-1/3 text-blue-600 transition">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-bold">Home</span>
        </button>

        <!-- 📝 Tests Tab (ညာဘက် Mock Test Pane သို့ သွားရန်) -->
        <button onclick="switchMobileTab('tests')" id="nav-tests" class="nav-btn flex flex-col items-center w-1/3 text-gray-400 hover:text-blue-600 transition">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] font-bold">Tests</span>
        </button>

    </nav>

    <div id="login-container"></div>

    <!-- ================================================================= -->
    <!-- 🎓 PL-300 Mock Test မျက်နှာပြင်အပြည့် (Full-Screen Modal)          -->
    <!-- ================================================================= -->
    <div id="quizModal" class="fixed inset-0 bg-gray-50 z-[70] hidden flex-col h-screen overflow-hidden">
        
        <!-- အပေါ်ပိုင်း (Header): ခေါင်းစဉ် နှင့် အချိန်မှတ် -->
        <div class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center z-10">
            <h2 class="text-xl font-bold text-gray-800" id="quizTitle">PL-300 Mock Test (Loading...)</h2>
            <div class="flex items-center space-x-4">
                <div class="bg-blue-100 text-blue-800 px-4 py-2 rounded-lg font-bold tracking-wider" id="quizTimer">00:00</div>
                <!-- 🏠 Home သို့ ပြန်သွားရန် ခလုတ် -->
                <button onclick="closeQuiz()" class="flex items-center text-gray-500 hover:text-red-500 font-bold transition bg-gray-100 hover:bg-red-50 px-4 py-2 rounded-lg">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Home သို့ ပြန်သွားမည်
                </button>
            </div>
        </div>

        <!-- အလယ်ပိုင်း (Body): မေးခွန်းများ နှင့် ရွေးချယ်စရာများ -->
        <div class="flex-1 overflow-y-auto p-6 md:p-10 flex justify-center">
            <div class="max-w-3xl w-full">
                
                <!-- 📊 Loading & Results Area -->
                <div id="quizLoading" class="text-center text-gray-500 font-bold mt-10">မေးခွန်းများ ဆွဲယူနေပါသည်... ⏳</div>
                <div id="quizResults" class="hidden text-center mt-10"></div>
                
                <!-- ❓ မေးခွန်းပေါ်မည့် နေရာ -->
                <div id="questionContainer" class="hidden bg-white p-8 rounded-2xl shadow-sm border">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-sm font-bold text-blue-600 uppercase" id="qNumber">Question 1 of 30</span>
                        <span class="text-sm font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full" id="qId">Q-001</span>
                    </div>
                    
                    <h3 class="text-lg font-bold text-gray-800 mb-6 leading-relaxed" id="qText">Question Text Here?</h3>
                    
                    <div class="space-y-3" id="optionsContainer">
                        <!-- Options များကို JS မှ အလိုအလျောက် ထည့်သွင်းပေးမည် -->
                    </div>
                </div>

            </div>
        </div>

        <!-- အောက်ပိုင်း (Footer): ရှေ့/နောက် သွားရန် ခလုတ်များ -->
        <div class="bg-white border-t px-6 py-4 flex justify-between items-center z-10">
            <button onclick="prevQuestion()" id="btnPrev" class="px-6 py-2 bg-gray-200 text-gray-700 font-bold rounded-lg hover:bg-gray-300 transition hidden">← နောက်သို့</button>
            <button onclick="nextQuestion()" id="btnNext" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition hidden">ရှေ့သို့ →</button>
            <button onclick="submitQuiz()" id="btnSubmitQuiz" class="px-6 py-2 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition hidden shadow-lg">အဖြေလွှာတင်မည် (Submit)</button>
        </div>
    </div>

    <!-- ================================================================= -->
    <!-- 🖼️ Student Reviews Floating Gallery Modal                       -->
    <!-- ================================================================= -->
    <div id="reviewsModal" class="fixed inset-0 bg-black/95 z-[80] hidden flex-col h-screen overflow-hidden backdrop-blur-sm transition-opacity duration-300">
        
        <!-- Header (Back Button) -->
        <div class="flex justify-between items-center p-4 bg-gradient-to-b from-black/80 to-transparent sticky top-0 z-10">
            <button onclick="closeReviewsModal()" class="text-white bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full font-bold flex items-center gap-2 backdrop-blur-md transition">
                <span>←</span> ပြန်ထွက်မည်
            </button>
            <span class="text-white/70 text-sm font-bold">Student Reviews</span>
        </div>

        <!-- Scrollable Images Area -->
        <div class="flex-1 overflow-y-auto p-4 flex flex-col items-center space-y-6 pb-20">
            <!-- Review 1 မှ 6 အထိ (လိုအပ်ပါက ထပ်တိုးနိုင်ပါသည်) -->
            <img src="Media_Files/review-001.webp" class="w-full max-w-lg rounded-xl shadow-2xl border border-gray-700" alt="Review 1">
            <img src="Media_Files/review-002.webp" class="w-full max-w-lg rounded-xl shadow-2xl border border-gray-700" alt="Review 2">
            <img src="Media_Files/review-003.webp" class="w-full max-w-lg rounded-xl shadow-2xl border border-gray-700" alt="Review 3">
            <img src="Media_Files/review-004.webp" class="w-full max-w-lg rounded-xl shadow-2xl border border-gray-700" alt="Review 4">
            <img src="Media_Files/review-005.webp" class="w-full max-w-lg rounded-xl shadow-2xl border border-gray-700" alt="Review 5">
            <img src="Media_Files/review-006.webp" class="w-full max-w-lg rounded-xl shadow-2xl border border-gray-700" alt="Review 6">
        </div>
    </div>
    <!-- ================================================================= -->


    <!-- Script ဖိုင်များ ချိတ်ဆက်ခြင်း (quiz.js ထပ်ဖြည့်ထားပါသည်) -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/quiz.js"></script> 
    <script src="js/main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
