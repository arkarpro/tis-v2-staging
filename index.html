<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Insights Solution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { tis: { dark: '#0f172a', primary: '#2563eb', secondary: '#1e3a8a', gold: '#eab308' } } } } }
    </script>
    <!-- 🟢 Google Identity Services လင့်ခ် -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>


<!-- အပေါ်မှ နေရာအနည်းငယ် လျှော့ချထားပါသည် (pt-16) -->
<body class="bg-gray-100 font-sans pt-16">

    <div id="navbar" class="fixed top-0 left-0 w-full z-50 bg-white shadow-sm"></div>

    <!-- အပေါ်နေရာချန်ခြင်းကို အနည်းငယ် ကျဉ်းထားပါသည် (pt-4 pb-6) -->
    <main class="max-w-7xl mx-auto px-4 pt-4 pb-6 grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
        
        <!-- 🔴 ပြင်ဆင်ချက် - sticky အစား md:sticky ဟု ပြောင်းထားပါသည် -->
        <div id="sidebar" class="md:col-span-3 md:sticky top-20 h-max"></div>
        
        <div id="content" class="md:col-span-6"></div>
        
        <!-- 🔴 ပြင်ဆင်ချက် - sticky အစား md:sticky ဟု ပြောင်းထားပါသည် -->
        <div id="widgets" class="md:col-span-3 md:sticky top-20 h-max"></div>
        
    </main>

    <div id="login-container"></div>
    <!-- ================================================================= -->
    <!-- 🎓 PL-300 Mock Test မျက်နှာပြင်အပြည့် (Full-Screen Modal)          -->
    <!-- ================================================================= -->
    <div id="quizModal" class="fixed inset-0 bg-gray-50 z-[70] hidden flex-col h-screen overflow-hidden">
        
        <!-- အပေါ်ပိုင်း (Header): ခေါင်းစဉ် နှင့် အချိန်မှတ် -->
        <div class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center z-10">
            <h2 class="text-xl font-bold text-gray-800" id="quizTitle">PL-300 Mock Test (Loading...)</h2>
            <div class="flex items-center space-x-4">
                <div class="bg-blue-100 text-blue-800 px-4 py-2 rounded-lg font-bold tracking-wider" id="quizTimer">00:00</div>
                <button onclick="closeQuiz()" class="text-gray-500 hover:text-red-500 font-bold transition">✖ ပိတ်မည်</button>
            </div>
        </div>

        <!-- အလယ်ပိုင်း (Body): မေးခွန်းများ နှင့် ရွေးချယ်စရာများ -->
        <div class="flex-1 overflow-y-auto p-6 md:p-10 flex justify-center">
            <div class="max-w-3xl w-full">
                
                <!-- 📊 Loading & Results Area -->
                <div id="quizLoading" class="text-center text-gray-500 font-bold mt-10">မေးခွန်းများ ဆွဲယူနေပါသည်... ⏳</div>
                <div id="quizResults" class="hidden text-center mt-10"></div>
                
                <!-- ❓ မေးခွန်းပေါ်မည့် နေရာ -->
                <div id="questionContainer" class="hidden bg-white p-8 rounded-2xl shadow-sm border">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-sm font-bold text-blue-600 uppercase" id="qNumber">Question 1 of 30</span>
                        <span class="text-sm font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full" id="qId">Q-001</span>
                    </div>
                    
                    <h3 class="text-lg font-bold text-gray-800 mb-6 leading-relaxed" id="qText">Question Text Here?</h3>
                    
                    <!-- ရွေးချယ်စရာ (A, B, C, D) နေရာ -->
                    <div class="space-y-3" id="optionsContainer">
                        <!-- Options များကို JS မှ အလိုအလျောက် ထည့်သွင်းပေးမည် -->
                    </div>
                </div>

            </div>
        </div>

        <!-- အောက်ပိုင်း (Footer): ရှေ့/နောက် သွားရန် ခလုတ်များ -->
        <div class="bg-white border-t px-6 py-4 flex justify-between items-center z-10">
            <button onclick="prevQuestion()" id="btnPrev" class="px-6 py-2 bg-gray-200 text-gray-700 font-bold rounded-lg hover:bg-gray-300 transition hidden">← နောက်သို့</button>
            <button onclick="nextQuestion()" id="btnNext" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition hidden">ရှေ့သို့ →</button>
            <button onclick="submitQuiz()" id="btnSubmitQuiz" class="px-6 py-2 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition hidden shadow-lg">အဖြေလွှာတင်မည် (Submit)</button>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>

</body>
</html>
