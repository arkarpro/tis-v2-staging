<!-- ================================================================= -->
<!-- 🔐 Auth Modal (Premium Design Version)                            -->
<!-- ================================================================= -->
<!-- Modal အဖွင့်တွင် backdrop-blur ကို နည်းနည်းပိုတင်ထားပြီး scale animation အတွက် ပြင်ဆင်ထားသည် -->
<div id="loginModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[60] backdrop-blur-md transition-opacity duration-300 p-4">
    
    <!-- Modal Box: ရိုးရိုးပေါ်လာခြင်းထက် ပိုမိုနူးညံ့သော Shadow နှင့် Roundness ကိုသုံးထားသည် -->
    <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] w-full max-w-md relative overflow-hidden transform transition-all scale-100">
        
        <!-- Close Button: ပိုမိုရှင်းလင်းသော Design -->
        <button onclick="closeLoginModal()" class="absolute top-5 right-5 text-gray-400 hover:text-gray-800 hover:bg-gray-100 p-2 rounded-full transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <div id="authMessage" class="mb-4 text-center text-sm font-bold"></div>

        <!-- ==================== ၁။ LOGIN FORM ==================== -->
        <div id="form-login" class="block animate-fade-in">
            <!-- 🎓 Logo / Icon Placeholder -->
            <div class="mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-blue-50 border border-blue-100 mb-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 14l9-5-9-5-9 5 9 5z"></path><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0v6"></path></svg>
            </div>
            
            <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-6">Welcome Back</h2>
            
            <!-- Email Input with Icon -->
            <div class="mb-4 relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <input type="email" id="loginEmail" placeholder="အီးမေးလ် (Email)" class="w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-gray-50 hover:bg-white transition text-sm">
            </div>
            
            <!-- Password Input with Icon -->
            <div class="mb-6 relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <input type="password" id="loginPassword" autocomplete="current-password" placeholder="စကားဝှက် (Password)" class="w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-gray-50 hover:bg-white transition text-sm">
            </div>
            
            <button onclick="submitLogin()" id="btn-login" class="w-full bg-blue-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-blue-700 hover:-translate-y-0.5 hover:shadow-lg transition-all duration-200 mb-4">ဝင်ရောက်မည် (Login)</button>
            
            <!-- Styled OR Divider -->
            <div class="flex items-center my-6">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-xs font-semibold uppercase tracking-wider">or continue with</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <!-- 🌐 Google Login Button နေရာ -->
            <div id="googleButtonDiv" class="flex justify-center mb-6"></div>

            <div class="flex flex-col sm:flex-row justify-between items-center text-sm gap-3">
                <a href="#" onclick="switchForm('form-forgot')" class="text-gray-500 hover:text-blue-600 font-medium transition">စကားဝှက်မေ့နေပါသလား?</a>
                <a href="#" onclick="switchForm('form-register')" class="text-blue-600 font-bold hover:text-blue-800 transition">အကောင့်သစ်ဖွင့်မည်</a>
            </div>
        </div>

        <!-- ==================== ၂။ REGISTER FORM ==================== -->
        <div id="form-register" class="hidden animate-fade-in">
            <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-6">အကောင့်သစ် ဖွင့်ရန်</h2>
            
            <!-- Name -->
            <div class="mb-4 relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></div>
                <input type="text" id="regName" placeholder="အမည် (Name)" class="w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50 text-sm">
            </div>
            
            <!-- Email -->
            <div class="mb-4 relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></div>
                <input type="email" id="regEmail" placeholder="အီးမေးလ် (Email)" class="w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50 text-sm">
            </div>
            
            <!-- Phone -->
            <div class="mb-4 relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg></div>
                <input type="text" id="regPhone" placeholder="ဖုန်းနံပါတ် (Phone)" class="w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50 text-sm">
            </div>
            
            <!-- Password -->
            <div class="mb-6 relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></div>
                <input type="password" id="regPassword" autocomplete="new-password" placeholder="စကားဝှက်အသစ် (Password)" class="w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50 text-sm">
            </div>
            
            <button onclick="submitRegister()" id="btn-register" class="w-full bg-green-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-green-700 hover:-translate-y-0.5 hover:shadow-lg transition-all duration-200">အတည်ပြုမည် (Sign Up)</button>
            <div class="text-center text-sm mt-5"><a href="#" onclick="switchForm('form-login')" class="text-gray-500 hover:text-blue-600 font-medium transition flex items-center justify-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> နောက်သို့ (Back to Login)</a></div>
        </div>

        <!-- ==================== ၃။ FORGOT PASSWORD FORM ==================== -->
        <div id="form-forgot" class="hidden animate-fade-in">
            <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-2">စကားဝှက် မေ့နေပါသလား?</h2>
            <p class="text-sm text-gray-500 mb-6 text-center px-4">သင့်အီးမေးလ်ကို ထည့်ပေးပါ။ Password ပြန်ယူရန် OTP ကုဒ် ပို့ပေးပါမည်။</p>
            
            <div class="mb-6 relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></div>
                <input type="email" id="forgotEmail" placeholder="အီးမေးလ် (Email)" class="w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50 text-sm">
            </div>
            
            <button onclick="submitForgotPassword()" id="btn-forgot" class="w-full bg-blue-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-blue-700 transition shadow-md">OTP ပို့မည်</button>
            <div class="text-center text-sm mt-5"><a href="#" onclick="switchForm('form-login')" class="text-gray-500 hover:text-blue-600 font-medium transition flex items-center justify-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> ပယ်ဖျက်မည်</a></div>
        </div>

        <!-- ==================== ၄။ OTP ထည့်ရန် FORM ==================== -->
        <div id="form-otp" class="hidden animate-fade-in">
            <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-2">OTP စစ်ဆေးခြင်း</h2>
            <p id="otpDisplayEmail" class="text-sm text-blue-600 bg-blue-50 py-2 rounded-lg mb-6 text-center font-semibold px-2"></p>
            
            <div class="mb-6">
                <input type="text" id="otpCode" autocomplete="one-time-code" placeholder="ဂဏန်း ၆ လုံး ထည့်ပါ" class="w-full px-4 py-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-600 bg-white text-center tracking-[0.5em] text-2xl font-bold shadow-inner">
            </div>
            
            <button onclick="submitOTP()" id="btn-otp" class="w-full bg-indigo-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-indigo-700 transition shadow-md">ကုဒ်အတည်ပြုမည်</button>
        </div>

        <!-- ==================== ၅။ စကားဝှက်အသစ် ပေးရန် FORM ==================== -->
        <div id="form-reset" class="hidden animate-fade-in">
            <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-6">စကားဝှက်အသစ် ဖန်တီးရန်</h2>
            
            <div class="mb-6 relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg></div>
                <input type="password" id="newPassword" autocomplete="new-password" placeholder="စကားဝှက်အသစ် (New Password)" class="w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50 text-sm">
            </div>
            
            <button onclick="submitNewPassword()" id="btn-reset" class="w-full bg-green-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-green-700 transition shadow-md">စကားဝှက် ပြောင်းမည်</button>
        </div>

    </div>
</div>
