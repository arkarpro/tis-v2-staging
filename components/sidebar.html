<!-- ၁။ Profile Card (Banner ပုံ အသစ်ဖြင့်) -->
<!-- Floating ပိုဖြစ်စေရန် shadow-lg နှင့် hover:-translate-y-1 ထည့်ထားပါသည် -->
<div class="bg-white rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300 overflow-hidden mb-6">
    
    <!-- 🖼️ Banner ပုံ ထည့်သွင်းထားသော နေရာ -->
    <div class="h-24 w-full bg-cover bg-center" style="background-image: url('tis_banner.webp');"></div>
    
    <div class="flex justify-center -mt-12 relative z-10">
        <!-- Logo ပုံ (ဆရာ့ Logo လင့်ခ် ပြန်ထည့်ပါ) -->
        <img src="YOUR_LOGO_URL_HERE" alt="TIS Logo" class="w-24 h-24 rounded-full border-4 border-white object-cover shadow-md bg-white">
    </div>
    
    <div class="text-center p-4 pt-2">
        <h2 class="font-bold text-lg text-gray-800">The Insights Solution</h2>
        <p class="text-xs text-gray-500 mt-1">Data Strategy Center</p>
    </div>
</div>

<!-- ၂။ Menu Card နှင့် Logout Button -->
<div class="bg-white rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 p-4">
    <h3 class="font-bold text-gray-800 mb-4 px-4">Your Learning</h3>
    <ul class="space-y-1">
        <li><a href="#" class="block px-4 py-2 text-sm text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors font-medium">Dashboard</a></li>
        <li><a href="#" class="block px-4 py-2 text-sm text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors font-medium">My Courses</a></li>
        <li><a href="#" class="block px-4 py-2 text-sm text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors font-medium">Certificates</a></li>
    </ul>

    <!-- 🚪 Logout ခလုတ် (Login ဝင်ထားမှသာ ပေါ်ရန် JS ဖြင့် ထိန်းချုပ်မည်) -->
    <div id="logout-section" class="mt-4 pt-4 border-t border-gray-100 hidden">
        <button onclick="logoutUser()" class="w-full text-center px-4 py-2 text-sm text-red-500 hover:bg-red-50 hover:text-red-700 rounded-lg transition-colors font-bold">
            အကောင့်မှ ထွက်မည် (Logout)
        </button>
    </div>
</div>
